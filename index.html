/* ─────────────────────────────
   MAP INIT
───────────────────────────── */
const initialView = { coords: [30, 10], zoom: 3 };
const map = L.map('map', { zoomControl: false }).setView(initialView.coords, initialView.zoom);

L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
    attribution: '© CartoDB',
    maxZoom: 19
}).addTo(map);

L.control.zoom({ position: 'bottomright' }).addTo(map);

/* ─────────────────────────────
   PIN FACTORY
───────────────────────────── */
function makeIcon(type) {
    return L.divIcon({
        className: 'custom-div-icon',
        html: `<div class="pin-wrap pin-${type}"><div class="pin-shape"></div></div>`,
        iconSize: [26, 32],
        iconAnchor: [13, 32],
        popupAnchor: [0, -32]
    });
}

/* ─────────────────────────────
   ADD MARKERS
───────────────────────────── */
let counts = { 'europe-erasmus': 0, 'europe-hors-erasmus': 0, 'hors-europe': 0 };

universites.forEach(uni => {
    if (!uni.coords || uni.coords.length !== 2) return;
    counts[uni.type] = (counts[uni.type] || 0) + 1;

    const marker = L.marker(uni.coords, { icon: makeIcon(uni.type) }).addTo(map);
    marker.bindTooltip(uni.nom, { direction: 'top', offset: [0, -30], className: 'leaflet-tooltip-custom' });
    marker.on('click', () => {
        map.flyTo(uni.coords, 13, { duration: 1.4 });
        showPanel(uni);
    });
});

// Update counter
document.getElementById('count-total').textContent = universites.length;
document.getElementById('count-erasmus').textContent = (counts['europe-erasmus'] || 0) + ' Europe – Erasmus';
document.getElementById('count-hors').textContent = (counts['europe-hors-erasmus'] || 0) + ' Europe – Hors Erasmus';
document.getElementById('count-monde').textContent = (counts['hors-europe'] || 0) + ' Hors Europe';

/* ─────────────────────────────
   PANEL LOGIC
───────────────────────────── */
const panel = document.getElementById('panel');

function val(v) {
    return v ? `<span class="info-card-value">${v}</span>`
             : `<span class="info-card-value empty">Non renseigné</span>`;
}

function badgeClass(type) {
    if (type === 'europe-hors-erasmus') return 'badge-hors-erasmus';
    if (type === 'hors-europe') return 'badge-monde';
    return 'badge-erasmus';
}
function badgeLabel(type) {
    if (type === 'europe-hors-erasmus') return 'Europe – Hors Erasmus';
    if (type === 'hors-europe') return 'Hors Europe';
    return 'Europe – Erasmus';
}

function showPanel(uni) {
    const content = document.getElementById('content');
    content.innerHTML = `
        <span class="panel-badge ${badgeClass(uni.type)}">${badgeLabel(uni.type)}</span>
        <h2 class="panel-title">${uni.nom}</h2>
        <p class="panel-code">${uni.pays || ''}${uni.code ? ' &nbsp;·&nbsp; ' + uni.code : ''}</p>

        <div class="info-grid">
            <div class="info-card card-gray">
                <div class="info-card-label label-gray">📋 Verdict global</div>
                ${val(uni.verdict)}
            </div>
            <div class="info-card card-blue">
                <div class="info-card-label label-blue">💰 Budget</div>
                ${val(uni.budget)}
            </div>
            <div class="info-card card-purple">
                <div class="info-card-label label-purple">🤝 Intégration</div>
                ${val(uni.integration)}
            </div>
            <div class="info-card card-green">
                <div class="info-card-label label-green">📚 Cours</div>
                ${val(uni.cours)}
            </div>
            <div class="info-card card-orange">
                <div class="info-card-label label-orange">📝 Examens</div>
                ${val(uni.examens)}
            </div>
            <div class="info-card card-indigo">
                <div class="info-card-label label-indigo">🏠 Logement</div>
                ${val(uni.logement)}
            </div>
            <div class="info-card card-cyan">
                <div class="info-card-label label-cyan">🚌 Transports</div>
                ${val(uni.transport)}
            </div>
            <div class="info-card card-amber">
                <div class="info-card-label label-amber">💡 Bon à savoir</div>
                ${val(uni.tips)}
            </div>
        </div>
    `;

    panel.style.width = '440px';
    panel.classList.add('open');
}

function closePanel() {
    panel.classList.remove('open');
    setTimeout(() => { panel.style.width = '0'; }, 450);
    map.flyTo(initialView.coords, initialView.zoom, { duration: 1.2 });
}
